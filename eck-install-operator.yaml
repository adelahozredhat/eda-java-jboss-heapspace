apiVersion: v1
kind: Namespace
metadata:
  name: eck-operator
  labels:
    openshift.io/cluster-monitoring: "true" # Permite métricas de OpenShift
---
apiVersion: v1
kind: Secret
metadata:
  name: eck-trial-license
  namespace: eck-operator
  annotations:
    elastic.co/eula: "accepted"  # <--- ESTO ES LO QUE FALTA
  labels:
    # Esta etiqueta es la que le dice al operador: "Genera un trial"
    license.k8s.elastic.co/type: enterprise_trial
    # Añadimos esta para asegurar que el operador lo gestione
    common.k8s.elastic.co/type: license
type: Opaque
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: elastic-operator-group
  namespace: eck-operator
spec:
  # Si se deja vacío, el operador vigila todos los namespaces del clúster
  targetNamespaces: []
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: elasticsearch-eck-operator-certified
  namespace: eck-operator
spec:
  channel: stable # Canal de actualizaciones (puede variar según la versión)
  installPlanApproval: Automatic # O "Manual" para aprobar actualizaciones
  name: elasticsearch-eck-operator-certified
  source: certified-operators # El catálogo oficial de Red Hat para partners
  sourceNamespace: openshift-marketplace