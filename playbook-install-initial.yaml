---
# Título: Playbook para crear un nuevo repositorio, su webhook y notificar
# Ejecutable desde AAP/AWX
- name: Crear nuevo repositorio, webhook y notificar
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    crc_url_api_client: "https://api.crc.testing:6443"
    crc_user: "kubeadmin"
    crc_validate_certs: false

    awx_host: example-ansible-automation-platform.apps-crc.testing
    awx_user: admin
    awx_password: admin

  tasks:

    - name: 
      shell: "oc login -u {{crc_user}} {{crc_url_api_client}}"

    - name: 
      shell: oc whoami --show-token
      register: token

    - name: Install AAP Operator
      kubernetes.core.k8s:
        state: present
        host: "{{ crc_url_api_client }}"
        api_key: "{{ token.stdout }}"
        validate_certs: "{{crc_validate_certs}}"
        src: automation-platform-install-operator.yaml
      register: step
      until: step.result.results| json_query('[?result.status.currentCSV]| [0].result.status.currentCSV') is defined and (step.result.results | json_query('[?result.status.currentCSV] | [0].result.status.currentCSV')) is not none
      retries: "25"
      delay: "20"

    - name: Report Operator Status
      ansible.builtin.debug:
        msg: "{{step.result.results| json_query('[?result.status.currentCSV]| [0].result.status.currentCSV')}}"

    - name: Get ClusterServiceVersion (CSV) status
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        name: "{{step.result.results| json_query('[?result.status.currentCSV]| [0].result.status.currentCSV')}}"
        namespace: "ansible-automation-platform"
      register: csv_status_check
      until: csv_status_check.resources| json_query('[?status.phase]| [0].status.phase') == "Succeeded"
      retries: "15"
      delay: "20"

    - name: Report Operator Status
      ansible.builtin.debug:
        msg: "{{csv_status_check.resources| json_query('[?status.phase]| [0].status.phase')}}"

    - name: Install AAP Instance
      kubernetes.core.k8s:
        state: present
        host: "{{ crc_url_api_client }}"
        api_key: "{{ token.stdout }}"
        validate_certs: "{{crc_validate_certs}}"
        src: automation-platform-install-ansible-automation-platform.yaml
      register: step3
      
    - name: ✅ Wait for the URL to be available (HTTP 200)
      ansible.builtin.uri:
        url: "https://example-ansible-automation-platform.apps-crc.testing/api/controller/v2/config/"
        method: GET
        status_code: 401 # The desired HTTP status code
        validate_certs: false # Set to true if using proper SSL/TLS certificates
      register: app_status_check
      until: app_status_check.status == 401
      retries: "50"
      delay: "20"
      delegate_to: localhost

    - name: "Get the Authentication Token for the future requests"
      ansible.builtin.uri:
        url: "https://{{ awx_host }}/api/gateway/v1/tokens/"
        user: "{{ awx_user }}"
        password: "{{ awx_password }}"
        method: POST
        force_basic_auth: true
        validate_certs: false
        status_code: 201
      register: authtoken_res

    - name: "Set the oauth token to be used since now"
      ansible.builtin.set_fact:
        aap_token: "{{ authtoken_res.json.token }}"
        aap_oauthtoken_url: "{{ authtoken_res.json.url }}"

    - name: Set the license using a file
      ansible.controller.license:
        manifest: "../manifest_AAP2.6_20260303T154318Z.zip"
        controller_host: "{{ awx_host }}"
        aap_token: "{{ aap_token }}"
        # controller_username: "{{ awx_user }}"
        # controller_password: "{{ awx_password }}"
        validate_certs: false
      register: app_status_check
      until: app_status_check  is succeeded
      retries: "15"
      delay: "15"
      delegate_to: localhost

    - name: "Delete the Authentication Token used"
      ansible.builtin.uri:
        url: "https://{{ awx_host }}{{aap_oauthtoken_url }}"
        user: "{{ awx_user }}"
        password: "{{ awx_password }}"
        method: DELETE
        force_basic_auth: true
        validate_certs: false
        status_code: 204
      when: aap_oauthtoken_url is defined

    - name: Openshift Virtualization Sub Yaml push on openshift
      kubernetes.core.k8s:
        host: "{{ crc_url_api_client }}"
        api_key: "{{ token.stdout }}"
        validate_certs: "{{crc_validate_certs}}"
        state: present
        src: openshift-virtualization.yaml
      register: step
      until: step.result.results| json_query('[?result.status.currentCSV]| [0].result.status.currentCSV') is defined and (step.result.results | json_query('[?result.status.currentCSV] | [0].result.status.currentCSV')) is not none
      retries: "10"
      delay: "15"

    - name: Report Operator Status
      ansible.builtin.debug:
        msg: "{{step.result.results| json_query('[?result.status.currentCSV]| [0].result.status.currentCSV')}}"

    - name: Get ClusterServiceVersion (CSV) status
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        name: "{{step.result.results| json_query('[?result.status.currentCSV]| [0].result.status.currentCSV')}}"
        namespace: "openshift-cnv"
      register: csv_status_check
      until: csv_status_check.resources| json_query('[?status.phase]| [0].status.phase') == "Succeeded"
      retries: "20"
      delay: "20"

    # - name: Get a list of all pods from any namespace
    #   redhat.openshift.k8s:
    #     api_key: "{{ openshift_auth_results.openshift_auth.api_key }}"
    #     state: present
    #     src: gitea.yaml
    #   register: pod_list

    # - name: Pause for 30 minutes to build app cache
    #   ansible.builtin.pause:
    #     minutes: 30

    # - name: AAP Controller Yaml push on openshift
    #   redhat.openshift.k8s:
    #     api_key: "{{ openshift_auth_results.openshift_auth.api_key }}"
    #     state: present
    #     src: aap-controller.yaml
    #   register: pod_list

    - name: Openahift Virtualization Hyper Converged Sub Yaml push on openshift
      kubernetes.core.k8s:
        host: "{{ crc_url_api_client }}"
        api_key: "{{ token.stdout }}"
        validate_certs: "{{crc_validate_certs}}"
        state: present
        src: openshift-virtualization-hyper-converged.yaml
      register: step
      until: step.result.status is defined and step.result.status.systemHealthStatus == "healthy"
      retries: "15"
      delay: "25"


    - name: Report Operator Status
      ansible.builtin.debug:
        msg: "{{step.result.status.systemHealthStatus}}"


    - name: FEdora VirtualMachine Yaml push on openshift
      kubernetes.core.k8s:
        host: "{{ crc_url_api_client }}"
        api_key: "{{ token.stdout }}"
        validate_certs: "{{crc_validate_certs}}"
        state: present
        src: openshift-virtualization-machine-fedora.yaml
      register: step
      until: step.result is defined and step.result.results| json_query('[?result.status.printableStatus]| [0].result.status.printableStatus') == 'Running'
      retries: "4"
      delay: "15"
      ignore_errors: true

    - name: Report Operator Status
      ansible.builtin.debug:
        msg: "{{step}}"

    # - name: Report Operator Status
    #   ansible.builtin.debug:
    #     msg: "{{step.result.results| json_query('[?result.status.printableStatus]| [0].result.status.printableStatus')}}"

    - name: Pause for 3 minutes to build app cache
      ansible.builtin.pause:
        minutes: 3

    - name: Crear Proyecto para el Playbook (Remediation)
      ansible.controller.project:
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_user }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        name: "JBoss Remediation Project"
        organization: "{{ organization }}"
        scm_type: git
        scm_url: "https://github.com/tu-usuario/repo-playbooks.git"
        wait: yes

    - name: Crear Proyecto para el Rulebook (EDA)
      ansible.controller.project:
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_user }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        name: "JBoss EDA Rulebook Project"
        organization: "{{ organization }}"
        scm_type: git
        scm_url: "https://github.com/tu-usuario/repo-rulebooks.git"
        wait: yes

    - name: Crear Job Template para HelloWorld
      ansible.controller.job_template:
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_user }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        name: "JBoss HelloWorld - OOM Reaction"
        project: "JBoss Remediation Project"
        playbook: "helloworld.yml"
        inventory: "{{ inventory_name }}"
        organization: "{{ organization }}"
        state: present
        ask_variables_on_launch: true

- name: Crear nuevo repositorio, webhook y notificar
  hosts: fedora
  gather_facts: no
  become: yes
  tasks:

    - name: Instalar Java 21 y Unzip (Necesario para descomprimir)
      ansible.builtin.dnf:
        name: 
          - java-21-openjdk-devel
          - unzip
        state: present

    - name: Copiar y Descomprimir JBoss EAP 8.1
      ansible.builtin.unarchive:
        src: "./jboss-eap-8.1.0-dev.zip" # Origen en tu local
        dest: /opt/                      # Destino en la VM
        remote_src: no                   # 'no' significa que el archivo está en el host de Ansible
        owner: fedora
        group: fedora

    - name: Configurar JAVA_OPTS con disparador EDA en standalone.conf
      ansible.builtin.lineinfile:
        path: /opt/jboss-eap-8.1/bin/standalone.conf
        line: |
          JAVA_OPTS="$JAVA_OPTS -XX:+HeapDumpOnOutOfMemoryError -XX:OnOutOfMemoryError=\"curl -k -H 'Content-Type: application/json' -X POST -d '{\"status\":\"OutOfMemory\",\"host\":\"$(hostname)\"}' https://example-ansible-automation-platform.apps-crc.testing/\""
        insertafter: EOF

    - name: Desplegar el exploit de memoria
      ansible.builtin.copy:
        src: "crash.war"
        dest: "/opt/jboss-eap-8.1/standalone/deployments/"
        owner: fedora
        group: fedora
        mode: '0644'

    - name: Iniciar JBoss como servicio
      shell: "nohup /opt/jboss-eap-8.1/bin/standalone.sh -b 0.0.0.0 &"