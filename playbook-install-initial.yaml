- name: Config Fedora Machine and install JBoss
  hosts: fedora-chocolate-smelt-74
  gather_facts: no
  become: yes
  tasks:

    - name: 
      shell: fuser -k 2222/tcp
      delegate_to: localhost
      become: no
      ignore_errors: true

    - name: Agregar repositorio Elastic
      ansible.builtin.yum_repository:
        name: elastic-9.x
        description: "Elastic repository for 9.x packages"
        baseurl: https://artifacts.elastic.co/packages/9.x/yum
        gpgcheck: yes
        gpgkey: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        enabled: yes

    # - name: Install java-21 and unzip
    #   ansible.builtin.dnf:
    #     name: 
    #       - java-21-openjdk-devel
    #       - unzip
    #       - filebeat
    #       # - python-firewall
    #       # - firewalld
    #     state: absent

    - name: Install java-21 and unzip
      ansible.builtin.dnf:
        name: 
          - java-21-openjdk-devel
          - unzip
          - filebeat
          # - python-firewall
          # - firewalld
        state: present

    - name: Check if exist binaries of Jboss
      ansible.builtin.stat:
        path: /opt/jboss-eap-8.1/bin
      register: jboss_dir

    - name: Unarchive JBoss EAP 8.1
      ansible.builtin.unarchive:
        src: "../jboss-eap-8.1.0-dev.zip" # Origen en tu local
        dest: /opt/                      # Destino en la VM
        remote_src: no                   # 'no' significa que el archivo está en el host de Ansible
        owner: fedora
        group: fedora
      when: not jboss_dir.stat.exists

    - name: Check if JBoss service exist
      ansible.builtin.stat:
        path: /etc/systemd/system/jboss-eap.service
      register: jboss_eap_service

    - name: Copy jboss-eap service file definition
      ansible.builtin.copy:
        src: "jboss-eap.service"
        dest: /etc/systemd/system
        owner: fedora
        group: fedora
        mode: '0644'
      when: not jboss_eap_service.stat.exists

    - name: Crear el directorio /opt/datos_fedora
      ansible.builtin.file:
        path: /opt/jboss-eap-8.1/standalone/log/dumps/
        state: directory
        owner: fedora
        group: fedora
        mode: '0755'
      when: not jboss_eap_service.stat.exists

    - name: Config standalone file config of Jboss to call to EDA
      ansible.builtin.lineinfile:
        path: /opt/jboss-eap-8.1/bin/standalone.conf
        line: |
          JAVA_OPTS="$JAVA_OPTS -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/opt/jboss-eap-8.1/standalone/log/dumps/ -XX:ErrorFile=/opt/jboss-eap-8.1/standalone/log/hs_err_pid%p.log -XX:OnOutOfMemoryError=\"curl -k -H 'Content-Type: application/json' -X POST -d '{\\\"status\\\":\\\"OutOfMemory\\\",\\\"host\\\":\\\"$(hostname)\\\"}' {{end_point_eda_rulebook}}/ \""
        insertafter: EOF
      when: not jboss_eap_service.stat.exists

    - name: Enabled and Restart jboss-eap service
      ansible.builtin.systemd:
        name: jboss-eap
        state: stopped
        enabled: yes
        daemon_reload: yes
      when: jboss_eap_service.stat.exists

    - name: Clean old deploys information
      ansible.builtin.file:
        path: "/opt/jboss-eap-8.1/standalone/deployments/{{ item }}"
        state: absent
      loop:
        - crash.war
        - crash.war.failed
        - crash.war.isdeploying
      when: jboss_eap_service.stat.exists

    - name: Deploy Crash memory application in JBoss
      ansible.builtin.copy:
        src: "crash.war"
        dest: "/opt/jboss-eap-8.1/standalone/deployments/"
        owner: fedora
        group: fedora
        mode: '0644'

    # - name: Abrir puerto 8080 en el firewall de la VM
    #   ansible.builtin.firewalld:
    #     port: 8080/tcp
    #     permanent: true
    #     state: enabled
    #     immediate: true
    #   become: true

    # - name: Iniciar JBoss como servicio
    #   shell: "nohup /opt/jboss-eap-8.1/bin/standalone.sh -b 0.0.0.0 &"

    - name: Enabled and Restart jboss-eap service
      ansible.builtin.systemd:
        name: jboss-eap
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Configurar Filebeat
      ansible.builtin.copy:
        dest: /etc/filebeat/filebeat.yml
        content: |
          filebeat.inputs:

            - type: filestream
              id: jboss-logs
              paths:
                - /opt/jboss-eap-8.1/standalone/log/server.log

              parsers:
                - multiline:
                    type: pattern
                    pattern: '^\d{4}-\d{2}-\d{2}'
                    negate: true
                    match: after

            - type: filestream
              id: jvm-errors
              paths:
                - /opt/jboss-eap-8.1/standalone/log/hs_err_pid*.log

            # - type: filestream
            #   id: heap-dumps
            #   paths:
            #     - /opt/jboss-eap-8.1/standalone/log/dumps/*.hprof

          processors:
            - add_host_metadata: ~

          output.elasticsearch:
            hosts: ["https://{{elastic_host}}:443"]
            username: "{{kibana_user}}"
            password: "{{ elastic_password }}"
            ssl.verification_mode: none

    - name: Habilitar Filebeat
      ansible.builtin.systemd:
        name: filebeat
        enabled: yes
        state: restarted

- name: Install components in Openshift
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:

    - name: 
      shell: "oc login --insecure-skip-tls-verify -u {{crc_user}} -p {{crc_password}} {{crc_url_api_client}} "

    - name: 
      shell: oc whoami --show-token
      register: token

    - name: Create servicio and route in openshift to expose endpoint of JBoss
      kubernetes.core.k8s:
        host: "{{ crc_url_api_client }}"
        api_key: "{{ token.stdout }}"
        validate_certs: "{{crc_validate_certs}}"
        state: present
        src: jboss-openshift-objects.yaml
      register: step

    - name: Get Host Route
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: "jboss-app-route"
        namespace: "virtualization-test"
      register: route_data

    - name: Get Url
      debug:
        msg: "Acceso externo habilitado en: http://{{ route_data.resources[0].spec.host }}"

    - name: Obtener connectors existentes
      uri:
        url: "https://{{kibana_host}}/api/actions/connectors"
        method: GET
        user: "{{kibana_user}}"
        password: "{{ elastic_password }}"
        force_basic_auth: yes
        validate_certs: no
        headers:
          kbn-xsrf: "true"

    - name: Crear webhook connector en Kibana
      uri:
        url: "https://{{kibana_host}}/api/actions/connector"
        method: POST
        user: "{{kibana_user}}"
        password: "{{ elastic_password }}"
        force_basic_auth: yes
        validate_certs: no
        headers:
          kbn-xsrf: "true"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "webhook-ansible"
          connector_type_id: ".webhook"
          config:
            url: "{{end_point_eda_rulebook}}"
            method: "post"
            hasAuth: false 
          secrets: {}
      register: webhook_result

    - name: Guardar connector_id
      set_fact:
        connector_id: "{{ webhook_result.json.id }}"

    - name: Test webhook connector
      uri:
        url: "https://{{kibana_host}}/api/actions/connector/{{ webhook_result.json.id }}/_execute"
        method: POST
        user: "{{kibana_user}}"
        password: "{{ elastic_password }}"
        force_basic_auth: yes
        validate_certs: no
        headers:
          kbn-xsrf: "true"
          Content-Type: "application/json"
        body_format: json
        body:
          params:
            body: "Test desde Ansible"

    - name: Crear regla alerta logs
      uri:
        url: "https://{{ kibana_host }}/api/alerting/rule"
        method: POST
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: yes
        validate_certs: no
        headers:
          kbn-xsrf: "true"
          Content-Type: "application/json"
        body_format: raw
        body: "{{ lookup('template', 'kibana_rule.json') }}"